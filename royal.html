<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Royal Oasis Spa Suite</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f6f3ee;
color:#222;
}

.hero img{
width:100%;
height:65vh;
object-fit:cover;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

h1{
margin-bottom:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:40px;
}

.gallery img{
width:100%;
border-radius:20px;
object-fit:cover;
}

form{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

input,select{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ddd;
font-size:16px;
}

button{
width:100%;
padding:16px;
background:#25D366;
color:white;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

#nights{
font-weight:bold;
margin-bottom:15px;
color:#c9a227;
}
</style>

<script>
function calculateNights(){
let checkin=new Date(document.getElementById("checkin").value);
let checkout=new Date(document.getElementById("checkout").value);

if(checkin && checkout){
let diff=(checkout-checkin)/(1000*60*60*24);
if(diff>0){
document.getElementById("nights").innerText="عدد الليالي: "+diff;
}else{
document.getElementById("nights").innerText="";
}
}
}

function sendBooking(){
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let checkin=document.getElementById("checkin").value;
let checkout=document.getElementById("checkout").value;
let guests=document.getElementById("guests").value;
let nights=document.getElementById("nights").innerText;

let message=
"طلب حجز - Royal Oasis\n\n"+
"الاسم: "+name+"\n"+
"الجوال: "+phone+"\n"+
"عدد الأشخاص: "+guests+"\n"+
"تاريخ الدخول: "+checkin+"\n"+
"تاريخ الخروج: "+checkout+"\n"+
nights;

let url="https://wa.me/966545288802?text="+encodeURIComponent(message);
window.open(url,"_blank");
}
</script>

</head>
<body>

<div class="hero">
<img src="IMG_1873.png">
</div>

<div class="container">

<h1>Royal Oasis Spa Suite</h1>

<div class="gallery">
<img src="IMG_1870.png">
<img src="IMG_1871.png">
<img src="IMG_1872.png">
<img src="IMG_1868.png">
<img src="IMG_1867.png">
</div>

<form onsubmit="event.preventDefault(); sendBooking();">

<input type="text" id="name" placeholder="الاسم الكامل" required>
<input type="tel" id="phone" placeholder="رقم الجوال" required>

<select id="guests">
<option>1 شخص</option>
<option>2 أشخاص</option>
<option>3 أشخاص</option>
<option>4 أشخاص</option>
</select>

<label>تاريخ الدخول</label>
<input type="date" id="checkin" onchange="calculateNights()" required>

<label>تاريخ الخروج</label>
<input type="date" id="checkout" onchange="calculateNights()" required>

<p id="nights"></p>

<input type="email" placeholder="البريد الإلكتروني (اختياري)">

<button type="submit">إرسال طلب الحجز</button>

</form>

</div>

</body>
</html>
