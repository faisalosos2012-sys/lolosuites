<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lolo Suites</title>

<style>
body{
margin:0;
font-family:'Segoe UI';
background:#f6f3ee;
color:#222;
text-align:center;
}

.header{
padding:60px 20px 30px;
}

.header h1{
font-size:42px;
margin-bottom:10px;
}

.header p{
color:#777;
}

.suites{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:40px;
padding:40px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
border-radius:30px;
overflow:hidden;
box-shadow:0 10px 40px rgba(0,0,0,.08);
transition:.4s;
}

.card:hover{
transform:translateY(-10px);
}

.card img{
width:100%;
height:380px;
object-fit:cover;
}

.card-content{
padding:25px;
}

.card-content h3{
margin-bottom:15px;
}

.btn{
display:inline-block;
padding:14px 30px;
background:#c9a227;
color:white;
border-radius:30px;
text-decoration:none;
}
</style>
</head>
<body>

<div class="header">
<h1>Lolo Suites</h1>
<p>Luxury Boutique Stay in Riyadh</p>
</div>

<div class="suites">

<div class="card">
<img src="IMG_1873.png">
<div class="card-content">
<h3>Royal Oasis Spa Suite</h3>
<a href="royal.html" class="btn">استعرض الجناح</a>
</div>
</div>

<div class="card">
<img src="IMG_1858.png">
<div class="card-content">
<h3>Amber Harmony Suite</h3>
<a href="amber.html" class="btn">استعرض الجناح</a>
</div>
</div>

</div>

</body>
</html>
